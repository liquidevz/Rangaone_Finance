name: Build & Deploy Next.js App FInal

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/${{ secrets.SERVER_USER }}/htdocs/www.rangaone.finance/Rangaone_Finance"
            IMAGE_NAME="nextjs-app"
            CONTAINER_NAME="nextjs-app"

            cd $APP_DIR

            echo "---- Pulling latest code ----"
            git fetch origin
            git reset --hard origin/main
            git clean -fdx

            echo "---- Building new Docker image ----"
            docker build --pull -t $IMAGE_NAME .

            echo "---- Starting new container on temp name ----"
            TEMP_NAME="${CONTAINER_NAME}_new"
            docker run -d \
              --name $TEMP_NAME \
              -p 3001:3000 \
              --restart unless-stopped \
              $IMAGE_NAME

            echo "---- Switching containers (zero downtime) ----"
            # Rename old container (if exists) so it’s freed
            if [ "$(docker ps -a -q -f name=$CONTAINER_NAME)" ]; then
              docker rename $CONTAINER_NAME "${CONTAINER_NAME}_old_$(date +%s)"
            fi

            # Rename new container to the main name
            docker rename $TEMP_NAME $CONTAINER_NAME

            # Map public port 3000 to the new container
            docker network connect bridge $CONTAINER_NAME || true
            docker stop $CONTAINER_NAME || true
            docker rm -f $CONTAINER_NAME || true
            docker run -d \
              --name $CONTAINER_NAME \
              -p 3000:3000 \
              --restart unless-stopped \
              $IMAGE_NAME

            echo "✅ Zero-downtime deployment complete."
