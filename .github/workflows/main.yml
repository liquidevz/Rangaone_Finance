name: Build & Deploy Next.js App Final

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/${{ secrets.SERVER_USER }}/htdocs/www.rangaone.finance/Rangaone_Finance"
            IMAGE_NAME="nextjs-app"
            CONTAINER_NAME="nextjs-app"
            TEMP_NAME="${CONTAINER_NAME}_new"

            cd $APP_DIR

            echo "---- Pulling latest code ----"
            git fetch origin
            git reset --hard origin/main
            git clean -fdx

            echo "---- Building new Docker image ----"
            docker build --pull -t $IMAGE_NAME .

            echo "---- Starting new container on temp name ----"
            docker run -d \
              --name $TEMP_NAME \
              -p 3001:3000 \
              --restart unless-stopped \
              $IMAGE_NAME

            echo "---- Swapping containers for zero downtime ----"
            # Stop old container if exists
            if [ "$(docker ps -q -f name=$CONTAINER_NAME)" ]; then
              docker rename $CONTAINER_NAME "${CONTAINER_NAME}_old_$(date +%s)"
            fi

            # Rename new container to main name
            docker rename $TEMP_NAME $CONTAINER_NAME

            # Optionally remove old containers older than 1 day
            docker ps -a -f name="${CONTAINER_NAME}_old_" --format '{{.ID}} {{.Names}} {{.CreatedAt}}' | while read id name created; do
              if [ $(date -d "$created" +%s) -lt $(date -d '1 day ago' +%s) ]; then
                docker rm -f $id
              fi
            done

            echo "✅ Zero-downtime deployment complete."
