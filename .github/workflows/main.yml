name: Build & Deploy Next.js App Final

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the latest code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Deploy via SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            APP_DIR="/home/${{ secrets.SERVER_USER }}/htdocs/www.rangaone.finance/Rangaone_Finance"

            cd $APP_DIR

            echo "---- Pulling latest code ----"
            git fetch origin
            git reset --hard origin/main
            git clean -fdx

            echo "---- Building new Docker image (no-cache) ----"
            docker-compose build --no-cache rangaone-fe

            echo "---- Starting new container on temp name ----"
            TEMP_CONTAINER="Rangaone_Finance_new"
            docker run -d \
              --name $TEMP_CONTAINER \
              -p 3001:3000 \
              --restart unless-stopped \
              rangaone-fe:latest

            echo "---- Switching containers (zero downtime) ----"
            # Stop old container gracefully
            if [ "$(docker ps -q -f name=Rangaone_Finance)" ]; then
              docker rename Rangaone_Finance Rangaone_Finance_old_$(date +%s)
            fi

            # Rename new container
            docker rename $TEMP_CONTAINER Rangaone_Finance

            # Re-map port 3000
            docker stop Rangaone_Finance || true
            docker rm -f Rangaone_Finance || true
            docker run -d \
              --name Rangaone_Finance \
              -p 3000:3000 \
              --restart unless-stopped \
              rangaone-fe:latest

            echo "✅ Zero-downtime deployment complete!"
