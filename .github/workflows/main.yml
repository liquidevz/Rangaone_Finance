name: Simple Deploy

on:
  push:
    branches: 
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 600s
          script: |
            set -e
            
            echo "Starting deployment..."
            
            # Navigate to app directory
            cd /home/rangaone/htdocs/www.rangaone.finance/Rangaone_Finance
            
            # Pull latest code
            echo "Pulling latest code..."
            git stash || true
            git pull origin main --force
            
            # Stop and remove existing container
            echo "Stopping existing container..."
            docker stop Rangaone_Finance 2>/dev/null || true
            docker rm Rangaone_Finance 2>/dev/null || true
            
            # Remove old images
            echo "Cleaning up old images..."
            docker rmi rangaone-fe:latest 2>/dev/null || true
            docker image prune -f
            
            # Build new image
            echo "Building new image..."
            docker build --no-cache -t rangaone-fe:latest .
            
            # Run new container
            echo "Starting new container..."
            docker run -d \
              --name Rangaone_Finance \
              -p 3000:3000 \
              --restart unless-stopped \
              -e NODE_ENV=production \
              -e NEXT_TELEMETRY_DISABLED=1 \
              -e VERCEL=1 \
              -e CI=true \
              rangaone-fe:latest
            
            # Check if container is running
            sleep 5
            if docker ps | grep -q "Rangaone_Finance"; then
              echo "Deployment successful!"
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | head -1
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep Rangaone_Finance
            else
              echo "Deployment failed!"
              docker logs Rangaone_Finance
              exit 1
            fi
            
            echo "Done!"